<!DOCTYPE html>
<html>
<head>
    <title>Student Login Form</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .container{
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2{
            text-align: center;
            color: navy;
        }

        table{
            width: 100%;
        }

        td{
            padding: 10px;
        }

        input[type=text],
        input[type=password]{
            width: 100%;
            padding: 8px;
        }

        .buttons{
            text-align: center;
        }

        input[type=submit],
        input[type=reset]{
            padding: 10px 20px;
            margin: 10px;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Student Login Form</h2>

<form action="response.php" method="get">

<table>

<tr>
<td><b>Username</b></td>
<td><input type="text" name="username" required></td>
</tr>

<tr>
<td><b>Password</b></td>
<td><input type="password" name="password" required></td>
</tr>

<tr>
<td colspan="2" class="buttons">
<input type="submit" value="Login">
<input type="reset" value="Clear">
</td>
</tr>

</table>

</form>

</div>

</body>
</html>
