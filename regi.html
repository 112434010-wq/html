<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>

<style>
body{
    font-family: Arial;
    background-color: lightgray;
}

.box{
    width:400px;
    margin:50px auto;          /* Centers the box */
    border:2px solid black;    /* Outline box */
    padding:20px;
    text-align:center;         /* Center alignment */
    background-color:white;
}

table{
    margin:auto;
}
</style>

</head>

<body>

<div class="box">

<h2>Student Registration Form</h2>

<form>
<table>

<tr>
<td>Name</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Email</td>
<td><input type="email"></td>
</tr>

<tr>
<td>Password</td>
<td><input type="password"></td>
</tr>

<tr>
<td>Gender</td>
<td>
<input type="radio" name="g">Male
<input type="radio" name="g">Female
</td>
</tr>

<tr>
<td>Address</td>
<td><textarea rows="3" cols="20"></textarea></td>
</tr>

<tr>
<td>Department</td>
<td>
<select>
<option>CSE</option>
<option>ECE</option>
<option>EEE</option>
<option>MECH</option>
</select>
</td>
</tr>

<tr>
<td>Languages</td>
<td>
<select multiple size="3">
<option>C</option>
<option>Java</option>
<option>Python</option>
</select>
</td>
</tr>

<tr>
<td>Hobbies</td>
<td>
<input type="checkbox">Reading
<input type="checkbox">Sports
</td>
</tr>

<tr>
<td>DOB</td>
<td><input type="date"></td>
</tr>

<tr>
<td colspan="2" align="center">
<input type="submit" value="Register">
<input type="reset" value="Clear">
</td>
</tr>

</table>
</form>

</div>

</body>
</html>
